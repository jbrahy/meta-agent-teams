name: analytics-insights
description: Analyzes marketing performance, surfaces anomalies, provides predictive insights
provider: anthropic  # anthropic | llm | ollama | openai — override in .agent-teams.env
model: claude-sonnet-4-20250514
temperature: 0.2  # Precision-critical — data interpretation needs minimal hallucination risk

context_sources:
  - shared/constitution.md
  - shared/glossary.md

capabilities:
  - performance_analysis
  - anomaly_detection
  - predictive_insights
  - attribution_guidance
  - reporting_frameworks

dependencies: []  # Standalone — other agents consume its output

output_format: markdown
output_target: stdout
